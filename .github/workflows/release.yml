name: Desktop Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build and publish, for example v1.0.1'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux
            os: ubuntu-latest
            flutter-target: linux
            package-command: npm run linux:release:tar
            dist-path: dist/linux/*
            artifact-name: mise-gui-linux
          - label: Windows
            os: windows-latest
            flutter-target: windows
            package-command: npm run windows:release:zip
            dist-path: dist/windows/*
            artifact-name: mise-gui-windows

    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Read Flutter version
        id: flutter-version
        shell: bash
        run: |
          version="$(sed -n 's/^flutter = "\(.*\)"/\1/p' mise.toml | head -n 1)"
          if [[ -z "$version" ]]; then
            echo "Could not read Flutter version from mise.toml" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ steps.flutter-version.outputs.version }}
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install Linux desktop toolchain
        if: matrix.flutter-target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            libglu1-mesa \
            libgtk-3-dev \
            libstdc++-12-dev \
            ninja-build \
            pkg-config \
            zip

      - name: Enable desktop target
        shell: bash
        run: flutter config --enable-${{ matrix.flutter-target }}-desktop

      - name: Show Flutter environment
        run: flutter doctor -v

      - name: Install Dart dependencies
        run: flutter pub get

      - name: Build package
        run: ${{ matrix.package-command }}
        env:
          USE_MISE: '0'

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.dist-path }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish packages to tag release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          tag="${INPUT_TAG:-$REF_NAME}"
          if [[ ! "$tag" == v* ]]; then
            echo "Release tag must start with v, got: $tag" >&2
            exit 1
          fi

          mapfile -d '' assets < <(find release-assets -type f -print0)
          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "No release assets were downloaded." >&2
            exit 1
          fi

          prerelease_args=()
          if [[ "$tag" == *-* ]]; then
            prerelease_args+=(--prerelease)
          fi

          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" \
              --verify-tag \
              --title "$tag" \
              --generate-notes \
              "${prerelease_args[@]}"
          fi

          gh release upload "$tag" "${assets[@]}" --clobber
